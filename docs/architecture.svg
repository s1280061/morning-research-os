<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 760" font-family="'Segoe UI',Arial,sans-serif">
  <defs>
    <linearGradient id="brand" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2d7ff9"/><stop offset="1" stop-color="#26c6f0"/>
    </linearGradient>
    <marker id="arr" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#3a4d6b"/>
    </marker>
    <marker id="arrD" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto">
      <path d="M0,0 L9,4.5 L0,9 Z" fill="#e17055"/>
    </marker>
  </defs>

  <rect width="1280" height="760" fill="#f4f8ff"/>

  <!-- Title -->
  <rect x="32" y="24" width="40" height="40" rx="11" fill="url(#brand)" transform="rotate(45 52 44)"/>
  <text x="52" y="45" text-anchor="middle" dominant-baseline="central" font-size="18" font-weight="800" fill="#fff">M</text>
  <text x="88" y="40" font-size="24" font-weight="800" fill="#16243b">Morning Research OS — Architecture</text>
  <text x="88" y="62" font-size="13" fill="#6b7e9c">静的PWA（バニラJS） + Vercelサーバーレス代理 + 外部API。堅牢性重視（多段フォールバック）。</text>

  <!-- ===== Browser panel ===== -->
  <rect x="40" y="96" width="320" height="470" rx="16" fill="#e8f0ff" stroke="#2d7ff9" stroke-width="1.5"/>
  <text x="60" y="124" font-size="15" font-weight="800" fill="#2d7ff9">📱 ブラウザ（PWA / 静的サイト）</text>

  <rect x="60" y="140" width="280" height="78" rx="10" fill="#fff" stroke="#cfe0ff"/>
  <text x="74" y="164" font-size="13.5" font-weight="700" fill="#16243b">index.html + config.js</text>
  <text x="74" y="184" font-size="11.5" fill="#3a4d6b">UI / loadAll() / callLLM / fetchViaProxy</text>
  <text x="74" y="202" font-size="11.5" fill="#3a4d6b">天気・市況・ニュース・論文・AIコーチ</text>

  <rect x="60" y="230" width="280" height="62" rx="10" fill="#fff" stroke="#cfe0ff"/>
  <text x="74" y="252" font-size="13" font-weight="700" fill="#16243b">localStorage</text>
  <text x="74" y="272" font-size="11.5" fill="#3a4d6b">設定 / AI結果45分キャッシュ / 天気・論文キャッシュ</text>

  <rect x="60" y="304" width="280" height="54" rx="10" fill="#fff" stroke="#cfe0ff"/>
  <text x="74" y="326" font-size="13" font-weight="700" fill="#16243b">Service Worker (sw.js)</text>
  <text x="74" y="344" font-size="11.5" fill="#3a4d6b">network-first / オフラインシェル</text>

  <rect x="60" y="372" width="280" height="176" rx="10" fill="#f7faff" stroke="#dbe8ff" stroke-dasharray="4 3"/>
  <text x="74" y="394" font-size="12" font-weight="700" fill="#2d7ff9">フォールバック方針</text>
  <text x="74" y="416" font-size="11.5" fill="#3a4d6b">① サーバキー(/api/chat)</text>
  <text x="74" y="436" font-size="11.5" fill="#3a4d6b">② ブラウザのキー(localStorage)</text>
  <text x="74" y="456" font-size="11.5" fill="#3a4d6b">③ ローカル要約（空にしない）</text>
  <text x="74" y="482" font-size="11.5" fill="#3a4d6b">データ: リトライ→別ソース→</text>
  <text x="74" y="500" font-size="11.5" fill="#3a4d6b">　　　　キャッシュ優先表示</text>
  <text x="74" y="526" font-size="11.5" fill="#3a4d6b">AIモデル自動切替: 120B→20B→70B</text>

  <!-- ===== Vercel panel ===== -->
  <rect x="480" y="96" width="300" height="470" rx="16" fill="#eafff4" stroke="#00b894" stroke-width="1.5"/>
  <text x="500" y="124" font-size="15" font-weight="800" fill="#00a884">☁️ Vercel（配信 + サーバーレス）</text>

  <rect x="500" y="146" width="260" height="96" rx="10" fill="#fff" stroke="#bdeedd"/>
  <text x="514" y="170" font-size="13.5" font-weight="700" fill="#16243b">/api/chat.mjs</text>
  <text x="514" y="190" font-size="11.5" fill="#3a4d6b">Groqを代理実行（キーは非公開）</text>
  <text x="514" y="208" font-size="11.5" fill="#3a4d6b">GET=ready / POST={reply}</text>
  <text x="514" y="228" font-size="11.5" fill="#3a4d6b">429時リトライ</text>

  <rect x="500" y="252" width="260" height="40" rx="9" fill="#fff7e8" stroke="#f1c889"/>
  <text x="514" y="276" font-size="12" font-weight="700" fill="#b8862b">🔐 ENV: GROQ_API_KEY</text>

  <rect x="500" y="402" width="260" height="120" rx="10" fill="#fff" stroke="#bdeedd"/>
  <text x="514" y="426" font-size="13.5" font-weight="700" fill="#16243b">/api/proxy.mjs</text>
  <text x="514" y="446" font-size="11.5" fill="#3a4d6b">同一オリジンCORS代理</text>
  <text x="514" y="464" font-size="11.5" fill="#3a4d6b">host許可リスト</text>
  <text x="514" y="482" font-size="11.5" fill="#3a4d6b">arXiv等はCDNキャッシュ</text>
  <text x="514" y="500" font-size="11.5" fill="#3a4d6b">(stale-while-revalidate)</text>

  <text x="500" y="552" font-size="11" fill="#6b7e9c">静的配信: index.html / favicon.svg / icons</text>

  <!-- ===== External panel ===== -->
  <rect x="900" y="96" width="340" height="600" rx="16" fill="#fff4e8" stroke="#e17055" stroke-width="1.5"/>
  <text x="920" y="124" font-size="15" font-weight="800" fill="#d9603f">🌐 外部API</text>

  <rect x="920" y="140" width="300" height="52" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="162" font-size="13" font-weight="700" fill="#16243b">Groq LLM API</text>
  <text x="934" y="181" font-size="11" fill="#3a4d6b">gpt-oss / Llama（AI生成）</text>

  <text x="920" y="220" font-size="11" font-weight="700" fill="#2d7ff9">— ブラウザから直接（CORS対応）—</text>
  <rect x="920" y="228" width="300" height="48" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="248" font-size="13" font-weight="700" fill="#16243b">Open-Meteo</text>
  <text x="934" y="266" font-size="11" fill="#3a4d6b">天気 + 時間帯予報 + ジオコーディング</text>

  <rect x="920" y="284" width="300" height="48" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="304" font-size="13" font-weight="700" fill="#16243b">OpenAlex</text>
  <text x="934" y="322" font-size="11" fill="#3a4d6b">論文（主ソース）</text>

  <rect x="920" y="340" width="300" height="48" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="360" font-size="13" font-weight="700" fill="#16243b">Google OAuth + Tasks</text>
  <text x="934" y="378" font-size="11" fill="#3a4d6b">クライアントOAuth（タスク同期）</text>

  <text x="920" y="420" font-size="11" font-weight="700" fill="#00a884">— /api/proxy 経由 —</text>
  <rect x="920" y="428" width="300" height="44" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="455" font-size="13" font-weight="700" fill="#16243b">Yahoo Finance（株価）</text>

  <rect x="920" y="480" width="300" height="44" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="507" font-size="13" font-weight="700" fill="#16243b">NHK / BBC / Al Jazeera（ニュース）</text>

  <rect x="920" y="532" width="300" height="44" rx="9" fill="#fff" stroke="#f3d0c2"/>
  <text x="934" y="559" font-size="13" font-weight="700" fill="#16243b">arXiv API / RSS（論文・予備）</text>

  <!-- ===== Arrows ===== -->
  <!-- Browser -> /api/chat -->
  <line x1="360" y1="186" x2="498" y2="190" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="372" y="176" font-size="10.5" fill="#3a4d6b">AI生成（キー不要）</text>
  <!-- /api/chat -> Groq -->
  <line x1="760" y1="186" x2="918" y2="166" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <!-- Browser -> /api/proxy -->
  <line x1="360" y1="430" x2="498" y2="450" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <text x="370" y="422" font-size="10.5" fill="#3a4d6b">市況/ニュース/論文(予備)</text>
  <!-- /api/proxy -> Yahoo / News / arXiv -->
  <line x1="760" y1="450" x2="918" y2="450" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="760" y1="460" x2="918" y2="502" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <line x1="760" y1="470" x2="918" y2="554" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>

  <!-- Browser -> direct (dashed, through Vercel empty middle) -->
  <line x1="360" y1="300" x2="918" y2="252" stroke="#e17055" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrD)"/>
  <line x1="360" y1="320" x2="918" y2="308" stroke="#e17055" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrD)"/>
  <line x1="360" y1="340" x2="918" y2="364" stroke="#e17055" stroke-width="2" stroke-dasharray="6 4" marker-end="url(#arrD)"/>
  <rect x="600" y="318" width="96" height="20" rx="5" fill="#fff" stroke="#f3d0c2"/>
  <text x="648" y="332" text-anchor="middle" font-size="10.5" fill="#d9603f">direct (CORS)</text>

  <!-- Footer: deploy -->
  <text x="40" y="612" font-size="13" font-weight="800" fill="#16243b">デプロイ</text>
  <rect x="40" y="624" width="180" height="40" rx="9" fill="#fff" stroke="#cfd9ea"/>
  <text x="130" y="648" text-anchor="middle" font-size="12" fill="#16243b">ローカル編集 → git push</text>
  <line x1="224" y1="644" x2="268" y2="644" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="272" y="624" width="200" height="40" rx="9" fill="#fff" stroke="#cfd9ea"/>
  <text x="372" y="648" text-anchor="middle" font-size="12" fill="#16243b">GitHub (自動連携)</text>
  <line x1="476" y1="644" x2="520" y2="644" stroke="#3a4d6b" stroke-width="2" marker-end="url(#arr)"/>
  <rect x="524" y="624" width="256" height="40" rx="9" fill="#eafff4" stroke="#00b894"/>
  <text x="652" y="648" text-anchor="middle" font-size="12" fill="#16243b">Vercel 自動デプロイ</text>

  <text x="40" y="700" font-size="11" fill="#6b7e9c">※ /api/*.mjs は ESMビルドのため拡張子は .mjs 必須。AIキーはサーバ環境変数に保持しブラウザに出さない。</text>
</svg>
